<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#bgGrad)"/>

  <!-- Table: header bar -->
  <rect x="7" y="14" width="26" height="5" rx="1.5" fill="white"/>
  <!-- Column dividers inside header -->
  <rect x="18" y="14" width="1" height="5" fill="#7c3aed" opacity="0.35"/>
  <rect x="26" y="14" width="1" height="5" fill="#7c3aed" opacity="0.35"/>

  <!-- Table: data row 1 -->
  <rect x="7"  y="22" width="9"  height="3" rx="1" fill="white" opacity="0.75"/>
  <rect x="19" y="22" width="6"  height="3" rx="1" fill="white" opacity="0.75"/>
  <rect x="27" y="22" width="6"  height="3" rx="1" fill="white" opacity="0.75"/>

  <!-- Table: data row 2 -->
  <rect x="7"  y="28" width="6"  height="3" rx="1" fill="white" opacity="0.45"/>
  <rect x="19" y="28" width="9"  height="3" rx="1" fill="white" opacity="0.45"/>
  <rect x="27" y="28" width="6"  height="3" rx="1" fill="white" opacity="0.45"/>

  <!--
    4-pointed sparkle star, centre (30, 8), outer-r=5, inner-r=2
    Outer tips  (at 0°/90°/180°/270° from top):
      top    (30, 3)
      right  (35, 8)
      bottom (30, 13)
      left   (25, 8)
    Inner vertices (at 45°/135°/225°/315°, r=2):
      (31.41, 6.59)  (31.41, 9.41)  (28.59, 9.41)  (28.59, 6.59)
  -->
  <path d="M30 3 L31.41 6.59 L35 8 L31.41 9.41 L30 13 L28.59 9.41 L25 8 L28.59 6.59 Z"
        fill="white"/>

  <!-- Tiny dot accent below sparkle for depth -->
  <circle cx="35" cy="4" r="1.2" fill="white" opacity="0.6"/>
</svg>
